name: build

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - platform: windows-x86_64
            os: windows-latest
            arch: x86_64
            artifact_ext: zip

          # macOS ARM64 (Apple Silicon)
          - platform: macos-arm64
            os: macos-latest
            arch: arm64
            artifact_ext: tar.gz

          # macOS x86_64 (Intel)
          - platform: macos-x86_64
            os: macos-15-intel
            arch: x86_64
            artifact_ext: tar.gz

          # Linux x86_64
          - platform: linux-x86_64
            os: ubuntu-latest
            arch: x86_64
            artifact_ext: tar.gz

          # Linux ARM64
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            arch: arm64
            artifact_ext: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Windows-specific: Install MSYS2 with Clang for a consistent toolchain.
      # libjcccol builds a single static library (libjcccol.a) with Clang on all platforms.
      - name: Install MSYS2 with Clang (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-llvm
            make
            tar
            zip

      - name: Add MinGW to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
          echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      # Linux-specific: Install Clang
      - name: Install Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      # macOS already has Clang installed via Xcode Command Line Tools

      - name: Verify toolchain (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          echo "=== Toolchain ==="
          uname -a || true
          make --version || true
          clang --version || true

      - name: Verify toolchain (Non-Windows)
        if: runner.os != 'Windows'
        run: |
          echo "=== Toolchain ==="
          uname -a || true
          make --version || true
          clang --version || true

      - name: Build library (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make clean && make

      - name: Build library (Non-Windows)
        if: runner.os != 'Windows'
        run: make clean && make

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make test

      - name: Run tests (Non-Windows)
        if: runner.os != 'Windows'
        run: make test

      # Stage + archive via `make dist`. Layout is defined in the Makefile
      # so it stays in one place.
      - name: Package dist bundle (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          make dist PLATFORM=${{ matrix.platform }} ARCHIVE=${{ matrix.artifact_ext }}
          ls -lR dist

      - name: Package dist bundle (Non-Windows)
        if: runner.os != 'Windows'
        run: |
          make dist PLATFORM=${{ matrix.platform }} ARCHIVE=${{ matrix.artifact_ext }}
          ls -lR dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libjcccol-${{ matrix.platform }}
          path: dist/libjcccol-${{ matrix.platform }}.${{ matrix.artifact_ext }}
          if-no-files-found: error
          retention-days: 30
