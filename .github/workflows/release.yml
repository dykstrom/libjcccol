name: release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v1.0.0, etc.
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  # Check that the tag is on the master/main branch before proceeding
  verify-branch:
    name: Verify tag is on release branch
    runs-on: ubuntu-latest
    outputs:
      on_release_branch: ${{ steps.check.outputs.on_release_branch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for all branches and tags

      - name: Check if tag is on master or main
        id: check
        run: |
          TAG_COMMIT=$(git rev-list -n 1 "$GITHUB_REF")
          echo "Tag commit: $TAG_COMMIT"

          if git merge-base --is-ancestor "$TAG_COMMIT" origin/master 2>/dev/null \
             || git merge-base --is-ancestor "$TAG_COMMIT" origin/main 2>/dev/null; then
            echo "Tag is on a release branch"
            echo "on_release_branch=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag is NOT on master or main"
            echo "on_release_branch=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  build-and-test:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: verify-branch

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - platform: windows-x86_64
            os: windows-latest
            arch: x86_64
            artifact_ext: zip

          # macOS ARM64 (Apple Silicon)
          - platform: macos-arm64
            os: macos-latest
            arch: arm64
            artifact_ext: tar.gz

          # macOS x86_64 (Intel)
          - platform: macos-x86_64
            os: macos-15-intel
            arch: x86_64
            artifact_ext: tar.gz

          # Linux x86_64
          - platform: linux-x86_64
            os: ubuntu-latest
            arch: x86_64
            artifact_ext: tar.gz

          # Linux ARM64
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            arch: arm64
            artifact_ext: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install MSYS2 with Clang (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-llvm
            make
            tar
            zip

      - name: Add MinGW to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
          echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      - name: Install Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Verify toolchain (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          uname -a || true
          make --version || true
          clang --version || true

      - name: Verify toolchain (Non-Windows)
        if: runner.os != 'Windows'
        run: |
          uname -a || true
          make --version || true
          clang --version || true

      - name: Build library (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make clean && make

      - name: Build library (Non-Windows)
        if: runner.os != 'Windows'
        run: make clean && make

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make test

      - name: Run tests (Non-Windows)
        if: runner.os != 'Windows'
        run: make test

      - name: Stage distribution (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          STAGE="dist/libjcccol-${{ matrix.platform }}"
          mkdir -p "$STAGE/lib" "$STAGE/include/jcccol"
          cp build/libjcccol.a "$STAGE/lib/"
          cp include/jcccol.h "$STAGE/include/"
          cp include/jcccol/core.h "$STAGE/include/jcccol/"
          cp README.md LICENSE "$STAGE/"
          ls -lR "$STAGE"

      - name: Stage distribution (Non-Windows)
        if: runner.os != 'Windows'
        run: |
          STAGE="dist/libjcccol-${{ matrix.platform }}"
          mkdir -p "$STAGE/lib" "$STAGE/include/jcccol"
          cp build/libjcccol.a "$STAGE/lib/"
          cp include/jcccol.h "$STAGE/include/"
          cp include/jcccol/core.h "$STAGE/include/jcccol/"
          cp README.md LICENSE "$STAGE/"
          ls -lR "$STAGE"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd dist
          zip -r "libjcccol-${{ matrix.platform }}.zip" "libjcccol-${{ matrix.platform }}"
          ls -l

      - name: Package archive (Non-Windows)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf "libjcccol-${{ matrix.platform }}.tar.gz" "libjcccol-${{ matrix.platform }}"
          ls -l

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libjcccol-${{ matrix.platform }}
          path: dist/libjcccol-${{ matrix.platform }}.${{ matrix.artifact_ext }}
          if-no-files-found: error
          retention-days: 90  # Keep release artifacts longer than build artifacts

  create-release:
    name: Create GitHub Release
    needs: [verify-branch, build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          # Remove 'v' prefix from tag (e.g., v0.1.0 -> 0.1.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display artifact structure
        run: |
          echo "=== Downloaded artifacts ==="
          ls -lR artifacts/

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## libjcccol ${{ steps.version.outputs.version }}

          The standard library for the COL programming language, designed for use with the [JCC compiler](https://github.com/dykstrom/jcc).

          ### What's Changed

          See the [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}) for detailed changes in this release.

          ### Platform Support

          This release includes a static library (`libjcccol.a`) for the following platforms:

          - **Windows x86_64** (Clang, MSYS2/MinGW64)
          - **macOS ARM64** (Apple Silicon)
          - **macOS x86_64** (Intel)
          - **Linux x86_64**
          - **Linux ARM64**

          ### Installation

          1. Download the appropriate archive for your platform
          2. Extract the archive
          3. The package contains:
             - `lib/libjcccol.a` — Static library
             - `include/jcccol.h` — Umbrella header
             - `include/jcccol/` — Per-module headers
             - `README.md` — Documentation
             - `LICENSE` — GPL-3.0 license text

          ### Usage

          Link COL programs against `lib/libjcccol.a` and add `include/` to the
          compiler's include search path. See the
          [JCC documentation](https://github.com/dykstrom/jcc) for integration
          instructions.
          EOF

          echo "Generated release notes:"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/libjcccol-windows-x86_64/*.zip
            artifacts/libjcccol-macos-arm64/*.tar.gz
            artifacts/libjcccol-macos-x86_64/*.tar.gz
            artifacts/libjcccol-linux-x86_64/*.tar.gz
            artifacts/libjcccol-linux-arm64/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "### Release ${{ steps.version.outputs.version }} created successfully :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Platforms:** Windows x86_64, macOS ARM64, macOS x86_64, Linux x86_64, Linux ARM64" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "View release at: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
